name: Financial-Agent

on:
  schedule:
    - cron: '0 14 * * *' # 2 PM UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0 # Necessary for the rebase to work

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install edgartools OpenDartReader requests google-generativeai pandas

      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py

      - name: Commit and Push State
        run: |
          git config --global user.name "Agent-Bot"
          git config --global user.email "bot@github.com"
          
          # This handles the conflict by putting the DB on top of your recent code push
          git pull origin main --rebase
          
          git add processed_filings.db
          git commit -m "Update state [skip ci]" || echo "No changes to commit"
          git push origin main