name: Financial-Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # THIS is where your token is activated
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install edgartools OpenDartReader requests google-genai pandas

      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py

      - name: Force Sync State
        run: |
          git config --global user.name "Agent-Bot"
          git config --global user.email "bot@github.com"
          
          # This ensures we are on the right branch and have the latest
          git checkout main
          git pull origin main --rebase
          
          git add processed_filings.db
          git commit -m "Update DB [skip ci]" || echo "No changes"
          
          # Pushing with the PAT-authenticated remote
          git push origin main