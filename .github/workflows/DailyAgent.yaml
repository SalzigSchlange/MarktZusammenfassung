name: Financial-Agent

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Restore Database
        uses: actions/cache@v4
        with:
          path: processed_filings.db
          # The key changes every run (using run_id), but it always 
          # looks for the most recent one starting with 'finance-db-'
          key: finance-db-${{ github.run_id }}
          restore-keys: |
            finance-db-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install edgartools OpenDartReader requests google-genai pandas

      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py

      # This saves the DB as a downloadable file on the Action page
      - name: Upload Database Artifact
        uses: actions/upload-artifact@v4
        with:
          name: financial-database
          path: processed_filings.db