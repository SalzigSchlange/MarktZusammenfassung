name: Financial-Agent
on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Database Cache
        uses: actions/cache@v4
        with:
          path: processed_filings.db
          key: ${{ runner.os }}-finance-db-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-finance-db-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install edgartools OpenDartReader requests google-genai pandas

      - name: Run Agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py

      # Instead of committing to Git, we save the DB as an 'Artifact' 
      # so you can download it from the GitHub UI anytime.
      - name: Upload Database Artifact
        uses: actions/upload-artifact@v4
        with:
          name: finance-database
          path: processed_filings.db