name: Financial-Agent
on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0 # Important for rebase

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install edgartools OpenDartReader requests google-genai pandas

      - name: Run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py

      - name: Commit State
        run: |
          git config --global user.name "Agent-Bot"
          git config --global user.email "bot@github.com"
          git add processed_filings.db
          # Pull changes you pushed locally, then put the new DB on top
          git pull origin main --rebase
          git commit -m "Update state [skip ci]" || echo "No changes"
          git push origin main