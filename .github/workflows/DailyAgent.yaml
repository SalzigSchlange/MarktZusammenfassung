name: Financial-Agent
on:
  schedule:
    - cron: '0 14 * * *' # 2 PM UTC
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: pip install edgartools OpenDartReader requests google-generativeai pandas
      - name: Run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py
      - name: Commit State
        run: |
          git config --global user.name "Agent-Bot"
          git config --global user.email "bot@github.com"
          
          # Fetch the latest from GitHub so the bot is 'in sync'
          git fetch origin main
          git checkout main
          
          # Add the changes
          git add processed_filings.db
          
          # Only commit if something actually changed
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update state [skip ci]" && git push origin main)